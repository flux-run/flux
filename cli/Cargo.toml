[package]
name = "cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "flux"
path = "src/main.rs"

[dependencies]
anyhow = "1"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.5.60", features = ["derive", "env"] }
colored = "2"
directories = "5"
dirs = "6.0.0"
reqwest = { version = "0.13.2", features = ["json", "multipart", "stream", "rustls"], default-features = false }
sha2 = "0.10"
hex = "0.4"
rpassword = "7.4.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
uuid = { version = "1.22.0", features = ["v4", "serde"] }
zip = "0.6"
flate2 = "1"
tar = "0.4"
xz2 = "0.1"
futures-util = "0.3"
open = "5"
urlencoding = "2"
which = "6"
toml = "0.8"
notify = "6"
dotenvy = "0.15"
postgresql_embedded = { version = "0.20.2", features = ["blocking"] }
sqlx = { version = "0.8.6", features = ["runtime-tokio", "postgres", "migrate"] }
# API contract — shared request/response types
api_contract = { path = "../shared/api_contract" }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
mockito = "1"
serde_json = "1"
tempfile = "3"
tokio = { version = "1", features = ["full"] }
