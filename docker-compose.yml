version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: flux
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flux
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux"]
      interval: 2s
      timeout: 5s
      retries: 5

  flux:
    # Build locally from the repo if the image isn't published yet
    build:
      context: .
      dockerfile: ./server/Dockerfile
    # Or pull from GHCR if available:
    # image: ghcr.io/flux-run/flux-server:latest
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://flux:password@postgres:5432/flux
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
