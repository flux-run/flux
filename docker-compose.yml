version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: flux
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flux
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux"]
      interval: 2s
      timeout: 5s
      retries: 5

  flux:
    # Pull from GHCR (pre-built image)
    image: ghcr.io/flux-run/flux-server:latest
    # Or build locally from the repo if you have the source code:
    # build:
    #   context: .
    #   dockerfile: ./server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://flux:password@postgres:5432/flux
      INTERNAL_SERVICE_TOKEN: local-development-token
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
