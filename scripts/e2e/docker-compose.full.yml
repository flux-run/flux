# scripts/e2e/docker-compose.full.yml
# ─────────────────────────────────────────────────────────────────────────────
# Mode 2: FULL — Flux + Postgres + Redis
#
# Proves: system works correctly with Redis present.
# Redis must not become a correctness dependency.
#
# Usage:
#   docker compose -f scripts/e2e/docker-compose.full.yml run --rm e2e
#   docker compose -f scripts/e2e/docker-compose.full.yml down -v
# ─────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flux_e2e_full
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  e2e:
    build:
      context: ../..
      dockerfile: scripts/e2e/Dockerfile.e2e
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/flux_e2e_full
      REDIS_URL: redis://redis:6379
      FLUX_PORT: "3000"
      FLUX_SERVER_URL: http://127.0.0.1:50051
      SERVICE_TOKEN: e2e-full-token
    network_mode: host
