# version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: flux
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flux
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  e2e:
    build:
      context: ../..
      dockerfile: scripts/e2e/Dockerfile.local
    environment:
      DATABASE_URL: "postgres://flux:password@postgres:5432/flux?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      FLUX_SERVER_URL: "http://localhost:50051"
      SERVICE_TOKEN: "flux-e2e-token"
      FLUXBASE_ALLOW_LOOPBACK_POSTGRES: "1"
      FLUXBASE_ALLOW_LOOPBACK_REDIS: "1"
      FLUXBASE_ALLOW_LOOPBACK_TCP: "1"
      FLUXBASE_ALLOW_LOOPBACK_FETCH: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
