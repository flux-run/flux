# scripts/e2e/docker-compose.local.yml
# ─────────────────────────────────────────────────────────────────────────────
# Local E2E verification for macOS/Windows.
# Builds binaries from source inside the container to ensure arch compatibility.
# ─────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flux_e2e_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  e2e:
    build:
      context: ../..
      dockerfile: scripts/e2e/Dockerfile.e2e.local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/flux_e2e_local
      REDIS_URL: ""
      FLUX_PORT: "3000"
      FLUX_SERVER_URL: http://127.0.0.1:50051
      SERVICE_TOKEN: e2e-local-token
    network_mode: host
