# scripts/e2e/docker-compose.minimal.yml
# ─────────────────────────────────────────────────────────────────────────────
# Mode 1: MINIMAL — Flux + Postgres only (no Redis)
#
# Proves: system correctness is independent of Redis.
# Redis absence must not cause failures or silent degradation.
#
# Usage:
#   docker compose -f scripts/e2e/docker-compose.minimal.yml run --rm e2e
#   docker compose -f scripts/e2e/docker-compose.minimal.yml down -v
# ─────────────────────────────────────────────────────────────────────────────
# version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flux_e2e
    ports:
      - "5432:5432"
    # Health check so e2e waits for postgres to be ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  e2e:
    build:
      context: ../..
      dockerfile: scripts/e2e/Dockerfile.local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/flux_e2e
      REDIS_URL: ""   # explicitly empty — testing the Redis-optional code path
      FLUX_PORT: "3000"
      FLUX_SERVER_URL: http://127.0.0.1:50051
      SERVICE_TOKEN: e2e-minimal-token
      FLUXBASE_ALLOW_LOOPBACK_POSTGRES: "1"
      FLUXBASE_ALLOW_LOOPBACK_REDIS: "1"
      FLUXBASE_ALLOW_LOOPBACK_TCP: "1"
      FLUXBASE_ALLOW_LOOPBACK_FETCH: "1"
    # The container runs the full user-flow.sh and exits with 0 or 1
