syntax = "proto3";

package flux.internal.v1;

service InternalAuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc ListLogs(ListLogsRequest) returns (ListLogsResponse);
  rpc RecordExecution(RecordExecutionRequest) returns (RecordExecutionResponse);
  rpc GetTrace(GetTraceRequest) returns (GetTraceResponse);
  rpc Why(WhyRequest) returns (WhyResponse);
  rpc Tail(TailRequest) returns (stream TailEvent);
  rpc Replay(ReplayRequest) returns (ReplayResponse);
  rpc Resume(ResumeRequest) returns (ResumeResponse);
  rpc DeployFunction(DeployFunctionRequest) returns (DeployFunctionResponse);
  rpc ListFunctions(ListFunctionsRequest) returns (ListFunctionsResponse);
  rpc DeleteFunction(DeleteFunctionRequest) returns (DeleteFunctionResponse);
  rpc ListEnvVars(ListEnvVarsRequest) returns (ListEnvVarsResponse);
  rpc SetEnvVar(SetEnvVarRequest) returns (SetEnvVarResponse);
  rpc DeleteEnvVar(DeleteEnvVarRequest) returns (DeleteEnvVarResponse);
  rpc PingTail(PingTailRequest) returns (PingTailResponse);
}

message PingTailRequest {
  string project_id = 1;
}

message PingTailResponse {
  bool ok = 1;
}

message DeployFunctionRequest {
  string project_id = 1;
  string name = 2; // function name (e.g. "hello-world")
  string artifact_json = 3; // The full FluxBuildArtifact JSON
}

message DeployFunctionResponse {
  bool ok = 1;
  string function_id = 2;
  string message = 3;
}

message ListFunctionsRequest {
  string project_id = 1;
}

message FunctionEntry {
  string id = 1;
  string name = 2;
  string created_at = 3;
}

message ListFunctionsResponse {
  repeated FunctionEntry functions = 1;
}

message DeleteFunctionRequest {
  string function_id = 1;
}

message DeleteFunctionResponse {
  bool ok = 1;
}

message ListEnvVarsRequest {
  string project_id = 1;
}

message EnvVarEntry {
  string key = 1;
  string value = 2; // Note: usually masked in UI, but here for CLI use
  string updated_at = 3;
}

message ListEnvVarsResponse {
  repeated EnvVarEntry env_vars = 1;
}

message SetEnvVarRequest {
  string project_id = 1;
  string key = 2;
  string value = 3;
}

message SetEnvVarResponse {
  bool ok = 1;
}

message DeleteEnvVarRequest {
  string project_id = 1;
  string key = 2;
}

message DeleteEnvVarResponse {
  bool ok = 1;
}

message ValidateTokenRequest {}

message ValidateTokenResponse {
  bool ok = 1;
  string auth_mode = 2;
  string project_id = 3;
}

message ListLogsRequest {
  uint32 limit = 1;
}

message ListLogsResponse {
  repeated LogEntry logs = 1;
}

message LogEntry {
  string execution_id = 1;
  string request_id = 2;
  string method = 3;
  string path = 4;
  string status = 5;
  int32 duration_ms = 6;
  string timestamp = 7;
  string error = 8;
  string code_version = 9;
  string project_id = 10;
  string error_source = 11;
  string error_type = 12;
}

message CheckpointEntry {
  uint32 call_index = 1;
  string boundary = 2;
  string url = 3;
  string method = 4;
  string request_json = 5;
  string response_json = 6;
  int32 duration_ms = 7;
}

message ConsoleLogEntry {
  string level = 1;
  string message = 2;
}

message RecordExecutionRequest {
  string execution_id = 1;
  string request_id = 2;
  string code_version = 3;
  string method = 4;
  string path = 5;
  string status = 6;
  string request_json = 7;
  string response_json = 8;
  string error = 9;
  int32 duration_ms = 10;
  repeated CheckpointEntry checkpoints = 11;
  repeated ConsoleLogEntry logs = 12;
  string project_id = 13;
  
  // Advanced Observability
  string client_ip = 14;
  string user_agent = 15;
  string request_method = 16;
  string request_headers_json = 17;
  string request_body = 18;
  int32 response_status = 19;
  string response_body = 20;
  string error_stack = 21;
  string error_fingerprint = 22;
  string error_source = 23;
  string error_type = 24;
  string error_name = 25;
  string error_message = 26;
  string error_phase = 27;
  bool is_user_code = 28;
  // JSON array of user-code stack frames [{file, line, col, fn?}, ...]
  string error_frames_json = 29;
}

message RecordExecutionResponse {
  bool ok = 1;
}

message GetTraceRequest {
  string execution_id = 1;
}

message Checkpoint {
  int32 call_index = 1;
  string boundary = 2;
  bytes request = 3;
  bytes response = 4;
  int32 duration_ms = 5;
}

message GetTraceResponse {
  string execution_id = 1;
  string method = 2;
  string path = 3;
  string status = 4;
  int32 duration_ms = 5;
  string error = 6;
  repeated Checkpoint checkpoints = 7;
  string request_json = 8;
  string response_json = 9;
  repeated ConsoleLogEntry logs = 10;
}

message WhyRequest {
  string execution_id = 1;
}

message WhyResponse {
  string execution_id = 1;
  string reason = 2;
  string suggestion = 3;
  string error_body = 4;
  repeated ConsoleLogEntry logs = 5;
  string method = 6;
  string path = 7;
  string status = 8;
  int32 duration_ms = 9;
}

message TailRequest {
  string project_id = 1;
}

message TailEvent {
  string execution_id = 1;
  string method = 2;
  string path = 3;
  string status = 4;
  int32 duration_ms = 5;
  string error = 6;
  int64 started_at = 7;
}

message ReplayRequest {
  string execution_id = 1;
  bool commit = 2;
  int32 from_index = 3;
  bool validate = 4;
}

message ReplayStep {
  int32 call_index = 1;
  string boundary = 2;
  string url = 3;
  bool used_recorded = 4;
  int32 duration_ms = 5;
  string source = 6;
  bool validated = 7;
}

message ReplayDivergence {
  int32 checkpoint_index = 1;
  string boundary = 2;
  string url = 3;
  string expected_json = 4;
  string actual_json = 5;
  repeated ReplayFieldDiff diffs = 6;
}

message ReplayFieldDiff {
  string path = 1;
  string expected_json = 2;
  string actual_json = 3;
  string kind = 4;
}

message ReplayResponse {
  string execution_id = 1;
  string status = 2;
  string output = 3;
  string error = 4;
  int32 duration_ms = 5;
  repeated ReplayStep steps = 6;
  ReplayDivergence divergence = 7;
}

message ResumeRequest {
  string execution_id = 1;
  int32 from_index = 2;
}

message ResumeResponse {
  string execution_id = 1;
  string status = 2;
  string output = 3;
  string error = 4;
  int32 duration_ms = 5;
  int32 from_index = 6;
  repeated ReplayStep steps = 7;
}
