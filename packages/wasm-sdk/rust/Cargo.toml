[package]
name    = "flux-wasm-sdk"
version = "0.1.0"
edition = "2021"
description = "Flux WASM runtime SDK for Rust — write functions in Rust, deploy as WASM"
license = "MIT"

# This crate is compiled to a WASM `cdylib` (shared library for WASM consumption).
# Add to your project: crate-type = ["cdylib"] in [lib]

[dependencies]
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"base64     = "0.22"
[profile.release]
# Minimise binary size for WASM deployment
opt-level    = "z"   # optimise for size
lto          = true  # link-time optimisation
codegen-units = 1    # single codegen unit (better LTO)
panic        = "abort" # omit unwind tables
strip        = true  # strip symbols
