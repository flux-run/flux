services:
  postgres:
    image: postgres:17-alpine
    container_name: crud_app_postgres
    environment:
      POSTGRES_DB: crud_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crud_app"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    build:
      context: ../..
      dockerfile: examples/crud_app/Dockerfile
    container_name: crud_app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/crud_app
      FLOWBASE_ALLOW_LOOPBACK_POSTGRES: "1"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres-data: