server {
    listen       80;
    server_name  _;

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json
                    application/x-javascript text/xml application/xml
                    application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ── Install script (/install) ──────────────────────────────────────────
    # curl -fsSL https://fluxbase.co/install | bash
    location = /install {
        root         /usr/share/nginx/static;
        default_type text/plain;
        add_header   Content-Disposition "inline";
        try_files    /install.sh =404;
    }

    # ── Static docs CSS/fonts/images ──────────────────────────────────────
    location /assets/ {
        root     /usr/share/nginx/static;
        expires  1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Docs (/docs, /docs/*) ─────────────────────────────────────────────
    location /docs {
        root  /usr/share/nginx/static;
        index index.html;
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Examples (/examples, /examples/*) ────────────────────────────────
    location /examples {
        root  /usr/share/nginx/static;
        index index.html;
        try_files $uri $uri/ $uri.html =404;
    }

    # ── React dashboard SPA (/dashboard and all sub-routes) ──────────────
    # Cache hashed JS/CSS assets from the React build forever.
    location ~* ^/dashboard/.*\.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    location /dashboard {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }

    # ── Marketing landing page (/ → home.html) ────────────────────────────
    # home.html is the landing page; index.html is the React SPA.
    location = / {
        root       /usr/share/nginx/static;
        try_files  /home.html =404;
    }

    # ── Static catch-all (for /install, unknown static paths) ────────────
    location / {
        root  /usr/share/nginx/static;
        try_files $uri $uri/ =404;
    }
}
