# .github/workflows/ci.yml
# Builds `flux`, `flux-server`, and `flux-runtime` binaries on every push,
# pull request, and version tag.  Covers all 6 platform/architecture combinations:
#   macOS   arm64  (native Apple Silicon runner)
#   macOS   amd64  (cross-compiled on Apple Silicon runner)
#   Linux   amd64  (native ubuntu runner)
#   Linux   arm64  (Docker cross via `cross`)
#   Windows amd64  (native windows runner)
#   Windows arm64  (cross-compiled on Windows amd64 runner)
#
# On push/PR:  artifacts retained 7 days (build validation).
# On v*.*.* tag: a GitHub Release is created with all binaries + checksums.

name: CI

on:
  push:
    branches: ["**"]
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: write   # needed to create releases and upload assets
  packages: write   # needed to push Docker images to GHCR

env:
  SQLX_OFFLINE: "true"
  CARGO_TERM_COLOR: always
  # Baked into the CLI binary so telemetry works in released builds.
  # Set this secret in: GitHub repo → Settings → Secrets → Actions → New secret
  FLUX_POSTHOG_KEY: ${{ secrets.FLUX_POSTHOG_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  V8_FROM_SOURCE: "0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (for rusty_v8 build script)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-ci-v4

      - name: Run tests
        run: cargo test --workspace
        env:
          SQLX_OFFLINE: "true"

  # ─── E2E User Flow Test ───────────────────────────────────────────────────
  # Runs the full CLI user flow inside real Docker containers.
  # Two modes prove:
  #   minimal → system correctness is independent of Redis
  #   full    → system works correctly with Redis present
  #
  # This is the PRODUCT gate. Both modes must pass before release.
  e2e:
    name: E2E / ${{ matrix.mode }}
    runs-on: ubuntu-22.04
    needs: build    # uses the Linux amd64 binaries produced by the build job
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: minimal   # Flux + Postgres only (proves Redis-optional path)
            compose_file: scripts/e2e/docker-compose.minimal.yml
          - mode: full      # Flux + Postgres + Redis
            compose_file: scripts/e2e/docker-compose.full.yml

    steps:
      - uses: actions/checkout@v4

      # Download the Linux amd64 binaries built by the build job
      - uses: actions/download-artifact@v4
        with:
          name: binaries-Linux-amd64
          path: target/release/

      - name: Mark binaries executable
        run: chmod +x target/release/flux target/release/flux-server target/release/flux-runtime

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build E2E image
        run: |
          docker build \
            -f scripts/e2e/Dockerfile.e2e \
            --build-arg FLUX_BIN=target/release/flux \
            --build-arg FLUX_SERVER_BIN=target/release/flux-server \
            --build-arg FLUX_RUNTIME_BIN=target/release/flux-runtime \
            -t flux-e2e:ci .

      - name: Run E2E flow (${{ matrix.mode }})
        run: |
          docker compose -f ${{ matrix.compose_file }} run --rm e2e
        env:
          COMPOSE_PROJECT_NAME: flux_e2e_${{ matrix.mode }}

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f ${{ matrix.compose_file }} logs || true
        env:
          COMPOSE_PROJECT_NAME: flux_e2e_${{ matrix.mode }}

      - name: Cleanup
        if: always()
        run: |
          docker compose -f ${{ matrix.compose_file }} down -v --remove-orphans || true
        env:
          COMPOSE_PROJECT_NAME: flux_e2e_${{ matrix.mode }}

  build:
    name: ${{ matrix.os-label }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - runner:    macos-14            # Apple Silicon — native ARM64
            target:   aarch64-apple-darwin
            os-label: macOS
            arch:     arm64
            cross:    false
            ext:      ""

          - runner:    macos-14            # cross-compile to AMD64 on ARM runner
            target:   x86_64-apple-darwin
            os-label: macOS
            arch:     amd64
            cross:    false
            ext:      ""

          # ── Linux ──────────────────────────────────────────────────────────
          - runner:    ubuntu-22.04
            target:   x86_64-unknown-linux-gnu
            os-label: Linux
            arch:     amd64
            cross:    false
            ext:      ""

          - runner:    ubuntu-22.04        # Docker cross for ARM64 Linux
            target:   aarch64-unknown-linux-gnu
            os-label: Linux
            arch:     arm64
            cross:    true
            ext:      ""

          # ── Windows ────────────────────────────────────────────────────────
          - runner:    windows-latest
            target:   x86_64-pc-windows-msvc
            os-label: Windows
            arch:     amd64
            cross:    false
            ext:      ".exe"
            # server and runtime skipped: rusty_v8 has no reliable prebuilt for windows-msvc.
            cli_only: true

          - runner:    windows-latest
            target:   aarch64-pc-windows-msvc
            os-label: Windows
            arch:     arm64
            cross:    false
            ext:      ".exe"
            # server and runtime skipped: rusty_v8 (deno_core/runtime) has no prebuilt
            # aarch64-pc-windows-msvc artifact; flux (cli) has no v8 dependency.
            cli_only: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (for rusty_v8 build script)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-ci-v4

      - name: Install cross (Linux ARM64 only)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build CLI
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p cli
          else
            cargo build --release --target ${{ matrix.target }} -p cli
          fi

      - name: Build flux-server
        if: ${{ matrix.cli_only != true }}
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p server
          else
            cargo build --release --target ${{ matrix.target }} -p server
          fi

      - name: Build flux-runtime
        if: ${{ matrix.cli_only != true }}
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p runtime --bin flux-runtime
          else
            cargo build --release --target ${{ matrix.target }} -p runtime --bin flux-runtime
          fi
        env:
          V8_FROM_SOURCE: "0"

      - name: Stage artifacts
        shell: bash
        run: |
          OS=$(echo "${{ matrix.os-label }}" | tr '[:upper:]' '[:lower:]')
          ARCH="${{ matrix.arch }}"
          EXT="${{ matrix.ext }}"
          TARGET="${{ matrix.target }}"

          mkdir -p dist
          cp "target/${TARGET}/release/flux${EXT}"          "dist/flux-${OS}-${ARCH}${EXT}"
          if [ "${{ matrix.cli_only }}" != "true" ]; then
            cp "target/${TARGET}/release/flux-server${EXT}"  "dist/flux-server-${OS}-${ARCH}${EXT}"
            cp "target/${TARGET}/release/flux-runtime${EXT}" "dist/flux-runtime-${OS}-${ARCH}${EXT}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os-label }}-${{ matrix.arch }}
          path: dist/
          retention-days: 7

  # ─── Create GitHub Release on v*.*.* tags pushed from main ───────────────
  release:
    name: Create Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build, e2e]   # RELEASE GATE: both build AND e2e must pass
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find dist -type f -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > sha256sums.txt

      - name: Extract release notes from CHANGELOG (if present)
        id: notes
        run: |
          if [[ -f CHANGELOG.md ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "notes=No changelog entry for this release." >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: flux ${{ github.ref_name }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://fluxbase.co/install | bash
            ```

            Or download binaries directly for your platform:

            ### `flux` (CLI)
            | Platform | Architecture | Download |
            |---|---|---|
            | macOS | arm64 | [flux-macos-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-macos-arm64) |
            | macOS | amd64 | [flux-macos-amd64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-macos-amd64) |
            | Linux | arm64 | [flux-linux-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-linux-arm64) |
            | Linux | amd64 | [flux-linux-amd64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-linux-amd64) |
            | Windows | arm64 | [flux-windows-arm64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-windows-arm64.exe) |
            | Windows | amd64 | [flux-windows-amd64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-windows-amd64.exe) |

            ### `flux-server`
            | Platform | Architecture | Download |
            |---|---|---|
            | macOS | arm64 | [flux-server-macos-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-server-macos-arm64) |
            | macOS | amd64 | [flux-server-macos-amd64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-server-macos-amd64) |
            | Linux | arm64 | [flux-server-linux-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-server-linux-arm64) |
            | Linux | amd64 | [flux-server-linux-amd64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-server-linux-amd64) |

            ### `flux-runtime`
            | Platform | Architecture | Download |
            |---|---|---|
            | macOS | arm64 | [flux-runtime-macos-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-runtime-macos-arm64) |
            | macOS | amd64 | [flux-runtime-macos-amd64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-runtime-macos-amd64) |
            | Linux | arm64 | [flux-runtime-linux-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-runtime-linux-arm64) |
            | Linux | amd64 | [flux-runtime-linux-amd64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/flux-runtime-linux-amd64) |

            ${{ steps.notes.outputs.notes }}
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ─── Push Docker Images to GHCR on v*.*.* tags ───────────────────────────
  docker-release:
    name: Push Docker Images
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-server
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push Flux Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
