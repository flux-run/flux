[package]
name = "runtime"
version = "0.1.1"
edition = "2024"

[lib]
name = "runtime"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
reqwest = { version = "0.13.2", features = ["json", "rustls"], default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
tracing = "0.1.44"
uuid = { version = "1.22.0", features = ["v4", "serde"] }

# Deno core for V8 isolates
deno_core = "0.354.0"
lru = "0.16.3"

[dev-dependencies]
futures = "0.3"
