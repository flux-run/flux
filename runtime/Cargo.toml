[package]
name = "runtime"
version = "0.1.1"
edition = "2024"

[lib]
name = "runtime"
path = "src/lib.rs"

[[bin]]
name = "runtime"
path = "src/main.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
axum = { version = "0.8.8", features = ["macros"] }
chrono = { version = "0.4.44", features = ["serde"] }
dotenvy = "0.15.7"
job_contract = { path = "../shared/job_contract" }
reqwest = { version = "0.13.2", features = ["json", "rustls"], default-features = false }
url = "2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
tower = { version = "0.5.3", features = ["util"] }
tower-http = { version = "0.6.8", features = ["trace", "cors"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
uuid = { version = "1.22.0", features = ["v4", "serde"] }

# Constant-time comparisons (token validation)
subtle = "2"

# Deno core for V8 isolates
deno_core = "0.354.0"
lru = "0.16.3"

# Wasmtime for WASM module execution (language-independent functions)
wasmtime = { version = "28", default-features = false, features = ["cranelift", "runtime", "async", "component-model"] }
# WASI p2 APIs for WASIP2 Component Model execution (e.g. C# .NET 10 via wasi-wasm)
wasmtime-wasi = { version = "28", default-features = false }
# Base64 for decoding inline WASM bundles (binary stored as base64 in bundle_code)
base64 = "0.22"
# JSON Schema validation — validate function input payloads in Rust before execution
jsonschema = { version = "0.29", default-features = false }

[dev-dependencies]
wat     = "1"
futures = "0.3"
