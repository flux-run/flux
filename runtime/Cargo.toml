[package]
name = "runtime"
version = "0.1.1"
edition = "2024"

[lib]
name = "runtime"
path = "src/lib.rs"

[[bin]]
name = "runtime"
path = "src/main.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
axum = { version = "0.8.8", features = ["macros"] }
chrono = { version = "0.4.44", features = ["serde"] }
dotenvy = "0.15.7"
job_contract = { path = "../shared/job_contract" }
api_contract = { path = "../shared/api_contract" }
reqwest = { version = "0.13.2", features = ["json", "rustls"], default-features = false }
url = "2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
tower = { version = "0.5.3", features = ["util"] }
tower-http = { version = "0.6.8", features = ["trace", "cors"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
uuid = { version = "1.22.0", features = ["v4", "serde"] }

# Constant-time comparisons (token validation)
subtle = "2"

# Deno core for V8 isolates
deno_core = "0.354.0"
lru = "0.16.3"

# JSON Schema validation — validate function input payloads in Rust before execution
jsonschema = { version = "0.29", default-features = false }
# sha2 for content-addressed artifact hashing
sha2 = "0.10"

# Postgres access for checkpoint store
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono"] }

[dev-dependencies]
futures = "0.3"
