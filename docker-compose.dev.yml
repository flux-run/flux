# Fluxbase local development stack — single-binary mode
#
# Prerequisites: Docker 24+ with docker compose v2.
#
# Usage:
#   flux stack up        — start all services (builds image if needed)
#   flux stack down      — stop and remove containers
#   flux stack ps        — list running containers
#   flux stack logs flux — tail server logs
#
# Required before first run:
#   Copy .env.dev.example → .env.dev and fill in your env vars.
#   Then: flux stack up --build

version: "3.9"

services:

  # ─── Infrastructure ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     flux
      POSTGRES_PASSWORD: flux
      POSTGRES_DB:       fluxbase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux -d fluxbase"]
      interval: 5s
      timeout: 5s
      retries: 10


  # ─── Flux — monolithic server (API + Gateway + Runtime + Queue + Data Engine)
  flux:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT:                    "4000"
      DATABASE_URL:            "postgresql://flux:flux@db:5432/fluxbase"
      INTERNAL_SERVICE_TOKEN:  "${INTERNAL_SERVICE_TOKEN:-fluxbase_local_dev_token}"
      LOCAL_MODE:              "${LOCAL_MODE:-true}"
      FLUX_LOCAL:              "${FLUX_LOCAL:-true}"
      ALLOWED_ORIGINS:         "${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}"
      ISOLATE_WORKERS:         "${ISOLATE_WORKERS:-4}"
      RATE_LIMIT_PER_SEC:      "${RATE_LIMIT_PER_SEC:-50}"
      MAX_REQUEST_SIZE_BYTES:  "${MAX_REQUEST_SIZE_BYTES:-10485760}"
      S3_BUCKET:               "${S3_BUCKET:-}"
      S3_ENDPOINT:             "${S3_ENDPOINT:-}"
      S3_REGION:               "${S3_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID:       "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY:   "${AWS_SECRET_ACCESS_KEY:-}"
    depends_on:
      db:
        condition: service_healthy

  # ─── Dashboard (React/Vite SPA, port 5173) ──────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL:     "http://localhost:4000/flux/api"
        VITE_GATEWAY_URL: "http://localhost:4000"
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - flux

volumes:
  pgdata:
    driver: local

networks:
  default:
    name: fluxbase_dev
