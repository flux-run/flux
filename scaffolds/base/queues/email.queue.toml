# email — Sample queue definition
# Functions push jobs with: await ctx.queue.push("email", payload)
# The handler function is invoked for each job.

name:        email
description: "Transactional email queue"
handler:     send_email          # function in functions/send_email/
concurrency: 5                   # max concurrent workers
retry:
  max_attempts: 3
  backoff: "exponential"         # exponential | linear | fixed
  initial_delay_ms: 1000
  max_delay_ms: 30_000
timeout_ms: 15_000

# Dead-letter queue — failed jobs go here after max_attempts
dlq: email_dlq

# Example push from a function:
# await ctx.queue.push("email", {
#   to:      "user@example.com",
#   subject: "Welcome to {name}!",
#   body:    "Thanks for signing up.",
# })
