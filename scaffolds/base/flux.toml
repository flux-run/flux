[project]
name    = "{name}"
version = "1"

[dev]
port            = 4000
hot_reload      = true
reload_debounce = 150    # ms

[deploy]
target = "docker"        # local | docker | kubernetes

[database]
# Leave blank to use embedded Postgres (zero config).
# Set DATABASE_URL in .env to connect to your own Postgres instance.
url = ""

[limits]
timeout_ms = 30_000
memory_mb  = 128

[observability]
sampling_rate  = 1.0    # 1.0 = record every request
slow_span_ms   = 500    # flag spans slower than this
retention_days = 90

[auth]
# JWT secret — set in .env as FLUX_JWT_SECRET
jwt_algorithm = "HS256"
token_expiry  = "24h"

[middleware]
global = []             # function names applied to every route

[cron]
# [[cron.jobs]]
# name     = "daily_cleanup"
# schedule = "0 0 * * *"       # cron expression
# function = "daily_cleanup"
