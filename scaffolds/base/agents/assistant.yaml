# assistant — Sample AI agent definition
# Agents use ctx.agent.run() and are powered by LLM + Flux tools.
# Requires FLUXBASE_LLM_KEY secret.

name:        assistant
description: "General-purpose assistant that can create issues, send emails, and look up users"
model:       gpt-4o-mini   # override with any OpenAI-compatible model
max_steps:   8

# Tools this agent is allowed to use (app.action format)
tools:
  - linear.create_issue
  - linear.list_issues
  - slack.send_message
  - gmail.send_email
  - github.create_issue

# System prompt injected before every run
system_prompt: |
  You are a helpful assistant for {name}. You have access to project management,
  communication, and code tools. Be concise and confirm before taking irreversible actions.

